model_list:

  - model_name: local-private
    litellm_params:
      model: ollama/phi3:mini
      api_base: http://ollama:11434

  - model_name: cloud-reasoning
    litellm_params:
      model: together_ai/Qwen/Qwen3.5-397B-A17B
      api_key: os.environ/TOGETHER_API_KEY
      extra_headers:
        X-Together-No-Store: "true"
        X-Title: "TriTier-Private-Gateway"

router_settings:
  routing_strategy: usage-based-routing
  num_retries: 2
  retry_after: 5

litellm_settings:
  drop_params: true
  set_verbose: true
  request_timeout: 120
  cache: false

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  disable_spend_logs: true
  disable_error_logs: false
