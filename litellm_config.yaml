model_list:

  - model_name: local-private
    litellm_params:
      model: ollama/gemma4:e4b
      api_base: http://ollama:11434

  - model_name: cloud-simple
    litellm_params:
      model: together_ai/Qwen/Qwen3.5-397B-A17B
      api_key: os.environ/TOGETHER_API_KEY
      extra_headers:
        X-Together-No-Store: "true"
        X-Title: "TriTier-Private-Gateway"

  - model_name: cloud-complex
    litellm_params:
      model: together_ai/Qwen/Qwen3-Coder-480B-A35B-Instruct-FP8
      api_key: os.environ/TOGETHER_API_KEY
      extra_headers:
        X-Together-No-Store: "true"
        X-Title: "TriTier-Private-Gateway"

router_settings:
  routing_strategy: usage-based-routing
  num_retries: 2
  retry_after: 5

litellm_settings:
  drop_params: true
  set_verbose: false
  request_timeout: 120
  cache: false
  callbacks: router_hook.proxy_handler_instance

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  disable_spend_logs: true
  disable_error_logs: false
